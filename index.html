<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Happiness Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-red: #FF6B6B;
            --accent-blue: #4ECDC4;
            --card-white: #ffffff;
            --text-dark: #2D3436;
            /* Standard Poker Card Ratio ~2.5:3.5 */
            --card-w: 350px;
            --card-h: 490px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Quicksand', sans-serif;
            background: #0f172a;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- HYPER-VISUAL BACKGROUND --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        .stars {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: starMove 100s linear infinite;
            opacity: 0.3;
        }

        @keyframes starMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        .aurora {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(78, 205, 196, 0.1) 0%, rgba(255, 107, 107, 0.1) 100%);
            filter: blur(100px);
            animation: auroraShift 20s infinite alternate;
        }

        @keyframes auroraShift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.5) translate(5%, 5%); }
        }

        /* --- PLAYING CARD CONTAINER --- */
        .card {
            background: var(--card-white);
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: transform 0.1s ease-out;
            border: 8px solid white;
            z-index: 10;
            overflow: hidden; /* Ensures corners stay within the radius */
        }

        /* Card Corner Circles - Smaller and clearly inside */
        .corner {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 11;
        }

        .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; }

        .card-inner {
            text-align: center;
            width: 100%;
            z-index: 12;
        }

        #display-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-dark);
            line-height: 1.3;
            transition: all 0.4s ease;
        }

        .punchline {
            margin-top: 1.5rem;
            color: var(--accent-red);
            font-size: 1.3rem;
            font-weight: 700;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .punchline.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- CONTROLS OUTSIDE CARD --- */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-compliment { background: var(--accent-blue); }
        .btn-joke { background: var(--accent-red); }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .btn:active { transform: translateY(0); }

        /* Animation Classes */
        .fade-out { opacity: 0; transform: scale(0.95); }

        @media (max-width: 400px) {
            :root {
                --card-w: 300px;
                --card-h: 420px;
            }
            .controls { flex-direction: column; width: 300px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="stars"></div>
        <div class="aurora"></div>
    </div>

    <main class="card" id="card">
        <!-- Corners -->
        <div id="corner-tr" class="corner tr">✨</div>
        <div id="corner-bl" class="corner bl">✨</div>

        <div class="card-inner">
            <p id="display-text">Pick a card, any card!</p>
            <p id="punchline-text" class="punchline"></p>
        </div>
    </main>

    <div class="controls">
        <button id="btn-comp" class="btn btn-compliment">Quirky Compliment</button>
        <button id="btn-joke" class="btn btn-joke">Family Joke</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const compliments = [
                "You're the human version of a warm towel out of the dryer.",
                "If you were a potato, you'd be a sweet one.",
                "You're like a software update that actually fixes things.",
                "I bet you're the person who knows the exact right time to take cookies out of the oven.",
                "You're more fun than bubble wrap.",
                "You have the coordination of a majestic giraffe.",
                "If you were a fruit, you'd be a fine-apple.",
                "I'd trust you with my Netflix password.",
                "You're the 'Expected' in a world of 'Exceptions'.",
                "You're like finding a $20 bill in your old jeans.",
                "You're the reason I check the 'Good Vibes' playlist.",
                "I'd share my last piece of pizza with you. Probably.",
                "You have the best 'surprised' face.",
                "You're like a Wi-Fi signal in a dead zone: a total lifesaver.",
                "If you were a dog, you'd be the 'Best in Show' every time.",
                "You're the only person I'd share my favorite pen with.",
                "You're the 'skip intro' button of life.",
                "You're better than a triple-scoop ice cream cone. With sprinkles.",
                "You have impeccable manners, even when you're hungry.",
                "You're like a high-five for the soul.",
                "Your brain is a treasure chest of cool, slightly weird ideas.",
                "You're the human equivalent of a perfect Sunday morning.",
                "You're remarkably brave, especially for someone who sees spiders.",
                "I bet you make babies smile effortlessly.",
                "You're the 'gold star' of humans.",
                "You're like a song that makes everyone want to dance badly.",
                "Your sense of humor is a national treasure.",
                "You're the reason the aliens haven't invaded yet.",
                "You're more precious than a 'limited edition' anything.",
                "You're the 'cool' in 'cool as a cucumber'.",
                "You're like sunshine on a rainy day, but without the humidity.",
                "You're the secret ingredient in everyone's favorite recipe.",
                "You make mundane tasks feel like a 90s montage.",
                "You're the cherry on top of a very tall sundae.",
                "You're like a cozy fireplace, but portable.",
                "You're a wizard at making things happen (legally, hopefully).",
                "You're like a perfect cup of tea—warm and comforting.",
                "You're the person everyone secretly wants on their trivia team.",
                "You're like a beautiful song that never gets stuck in a bad way.",
                "You're a superstar, even in your pajamas.",
                "You're the 'magic' in a world of 'muggles'.",
                "You're like a field of wildflowers in a concrete jungle.",
                "You're a gem, and not the fake kind from a plastic ring.",
                "You're the 'spark' in 'sparkle'. Literally.",
                "You're like a warm hug for the brain.",
                "You're the 'wow' in 'wonderful'.",
                "You're like a clear blue sky on a day everyone expected rain.",
                "You're the 'best' in 'best-case scenario'.",
                "You're like a gentle breeze in a heatwave.",
                "You're a total rockstar (even if you only sing in the shower)."
            ];

            const jokes = [
                { s: "Why did the scarecrow win an award?", p: "Because he was outstanding in his field!" },
                { s: "What do you call a fake noodle?", p: "An impasta!" },
                { s: "Why don't scientists trust atoms?", p: "Because they make up everything!" },
                { s: "What did the ocean say to the beach?", p: "Nothing, it just waved." },
                { s: "Why did the melon jump into the lake?", p: "It wanted to be a water-melon!" },
                { s: "What do you call a bear with no teeth?", p: "A gummy bear!" },
                { s: "Why did the bicycle fall over?", p: "Because it was two-tired!" },
                { s: "How do you organize a space party?", p: "You planet!" },
                { s: "What do you call a sleeping dinosaur?", p: "A dino-snore!" },
                { s: "Why can't you give Elsa a balloon?", p: "Because she will let it go!" },
                { s: "What do you call an alligator in a vest?", p: "An investigator!" },
                { s: "Why did the cookie go to the doctor?", p: "Because he was feeling crumbly!" },
                { s: "What do you call a sheep with no legs?", p: "A cloud!" },
                { s: "Why did the math book look so sad?", p: "Because it had so many problems." },
                { s: "What do you call a fly with no wings?", p: "A walk!" },
                { s: "Why did the tomato turn red?", p: "Because it saw the salad dressing!" },
                { s: "What do you call a dog that does magic tricks?", p: "A labracadabrador!" },
                { s: "Why are elevator jokes so classic?", p: "They work on so many levels." },
                { s: "What did one plate say to the other?", p: "Dinner is on me!" },
                { s: "Why did the spider get a job in IT?", p: "He was a great web designer!" },
                { s: "What do you call a cow with no legs?", p: "Ground beef!" },
                { s: "Why did the golfer bring two pairs of pants?", p: "In case he got a hole in one!" },
                { s: "What's orange and sounds like a parrot?", p: "A carrot!" },
                { s: "How does a penguin build its house?", p: "Igloos it together!" },
                { s: "What did the teacher do with the student's window report?", p: "She looked right through it!" },
                { s: "Why don't skeletons fight each other?", p: "They don't have the guts." },
                { s: "What do you call a pig that knows karate?", p: "A pork chop!" },
                { s: "Why was the belt arrested?", p: "For holding up a pair of pants!" },
                { s: "What do you call a cold dog?", p: "A chili dog!" },
                { s: "How do you catch a squirrel?", p: "Climb a tree and act like a nut!" },
                { s: "Why did the stadium get hot after the game?", p: "All the fans left!" },
                { s: "What do you call a factory that makes okay products?", p: "A satisfactory!" },
                { s: "Why did the picture go to jail?", p: "Because it was framed!" },
                { s: "What do you call a pile of kittens?", p: "A meow-ntain!" },
                { s: "Why did the gym close down?", p: "It just didn't work out!" },
                { s: "How do celebrities stay cool?", p: "They have many fans!" },
                { s: "What do you call an elephant that doesn't matter?", p: "An irrelephant!" },
                { s: "Why was the broom late?", p: "It over-swept!" },
                { s: "What kind of shoes do ninjas wear?", p: "Sneakers!" },
                { s: "Why did the mushroom go to the party?", p: "Because he was a fungi!" },
                { s: "What did the sink say to the toilet?", p: "You look flushed!" },
                { s: "Why do seagulls fly over the sea?", p: "Because if they flew over the bay, they'd be bagels!" },
                { s: "What do you call a boomeranging joke?", p: "A joke that comes back to you!" },
                { s: "Why did the lamp go to school?", p: "It wanted to be bright!" },
                { s: "What do you call a person who is afraid of Santa?", p: "Claustrophobic!" },
                { s: "Why did the banana go to the doctor?", p: "It wasn't peeling well!" },
                { s: "How do you make a tissue dance?", p: "Put a little boogey in it!" },
                { s: "What do you call a horse that lives next door?", p: "A neighbor!" },
                { s: "Why did the cat sit on the computer?", p: "To keep an eye on the mouse!" },
                { s: "What did the buffalo say to his son when he left?", p: "Bison!" }
            ];

            const cornerEmojis = ["🃏", "♣️", "♥️", "♠️", "♦️", "👑", "🍀", "💎", "⭐", "🔥", "🦄", "🌈", "🍕", "🎸", "🚀", "🍦"];
            const cornerColors = ["#FF6B6B", "#4ECDC4", "#FFE66D", "#A18CD1", "#FAD0C4", "#84FAB0", "#FF9F43", "#54a0ff"];

            const display = document.getElementById('display-text');
            const punchline = document.getElementById('punchline-text');
            const card = document.getElementById('card');
            const cornerTR = document.getElementById('corner-tr');
            const cornerBL = document.getElementById('corner-bl');
            
            const btnComp = document.getElementById('btn-comp');
            const btnJoke = document.getElementById('btn-joke');

            let lastIdx = -1;
            let punchlineTimer = null;

            function randomizeCorners() {
                // Select ONE color and ONE icon per generation
                const color = cornerColors[Math.floor(Math.random() * cornerColors.length)];
                const icon = cornerEmojis[Math.floor(Math.random() * cornerEmojis.length)];
                
                [cornerTR, cornerBL].forEach(el => {
                    el.style.backgroundColor = color;
                    el.textContent = icon;
                    // Reset animation
                    el.style.transform = `scale(0.8)`;
                    setTimeout(() => el.style.transform = `scale(1)`, 50);
                });
            }

            function updateCard(type) {
                // Reset UI
                if (punchlineTimer) clearTimeout(punchlineTimer);
                display.classList.add('fade-out');
                punchline.classList.remove('visible');
                
                setTimeout(() => {
                    randomizeCorners();
                    
                    if (type === 'comp') {
                        let idx;
                        do { idx = Math.floor(Math.random() * compliments.length); } while (idx === lastIdx);
                        lastIdx = idx;
                        display.textContent = compliments[idx];
                        punchline.textContent = "";
                    } else {
                        let idx;
                        do { idx = Math.floor(Math.random() * jokes.length); } while (idx === lastIdx);
                        lastIdx = idx;
                        display.textContent = jokes[idx].s;
                        punchline.textContent = jokes[idx].p;
                        
                        punchlineTimer = setTimeout(() => {
                            punchline.classList.add('visible');
                        }, 1800);
                    }
                    
                    display.classList.remove('fade-out');
                }, 300);
            }

            btnComp.addEventListener('click', () => updateCard('comp'));
            btnJoke.addEventListener('click', () => updateCard('joke'));

            // Card 3D tilt effect
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 20;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        });
    </script>
</body>
</html>
